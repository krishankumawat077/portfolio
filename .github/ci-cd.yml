# ═══════════════════════════════════════════════════
#  Campus Connect — CI/CD Pipeline (GitHub Actions)
#  Triggered on every push to main branch
# ═══════════════════════════════════════════════════

name: CI/CD — Campus Connect

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Run tests ───────────────────────────
  test:
    name: 🧪 Run Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests
        working-directory: backend
        run: npm test

  # ── Job 2: Deploy frontend to GitHub Pages ─────
  deploy-frontend:
    name: 🌐 Deploy Frontend → GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          publish_branch: gh-pages
          commit_message: "🚀 Deploy — ${{ github.sha }}"

  # ── Job 3: Trigger Render backend redeploy ─────
  deploy-backend:
    name: 🚀 Redeploy Backend on Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Render deploy triggered"
